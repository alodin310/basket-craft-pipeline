services:
  db:
    image: postgres:15
    container_name: basket-craft-db
    environment:
      POSTGRES_DB: basket_craft
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - basket_craft_data:/var/lib/postgresql/data

volumes:
  basket_craft_data:
